<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAFTWERK — Control Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;600;700&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="running"  aria-hidden="true"></div>
    <div id="stopped"  aria-hidden="true"></div>

    <input type="checkbox" id="sw-1" aria-label="Pump A power">
    <input type="checkbox" id="sw-2" aria-label="Pump B power">
    <input type="checkbox" id="sw-3" aria-label="Turbine power">

    <header>
        <p>Block A · Reactor 1</p>
        <h1><span>KRAFT</span>WERK</h1>
        
        <!-- Easter egg 3: hover h1 for 2s → plant name fades in -->
        <p>Control Panel</p>
        <p aria-hidden="true">Kraftwerk Power Station · Block A · 1974</p>
    </header>

    <main aria-label="Control Panel">

        <!-- Easter egg 5: inspection stamp — hidden detail -->
        <p aria-hidden="true">INSPECTED · 1974</p>

        <!-- Easter egg 6: engineer engraving -->
        <p aria-hidden="true">Eng. J.R. Krebbers</p>

        <!-- Easter egg 7: coffee cup ring stain on panel surface -->
        <span aria-hidden="true"></span>

        <!-- ── GAUGES ── -->
        <section aria-label="Instrument gauges">

            <figure>
                <div aria-hidden="true">
                    <span>Hz</span>
                    <span></span><!-- arc -->
                    <span></span><!-- needle -->
                    <span><i>48</i><i>50</i><i>52</i></span>
                </div>
                <figcaption>Frequency</figcaption>
            </figure>

            <figure>
                <div aria-hidden="true">
                    <span>bar</span>
                    <span></span>
                    <span></span>
                    <span><i>0</i><i>100</i><i>200</i></span>
                </div>
                <figcaption>Pressure</figcaption>
            </figure>

            <figure>
                <div aria-hidden="true">
                    <span>°C</span>
                    <span></span>
                    <span></span>
                    <span><i>0</i><i>300</i><i>600</i></span>
                </div>
                <figcaption>Temperature</figcaption>
            </figure>

            <figure>
                <div aria-hidden="true">
                    <span>MW</span>
                    <span></span>
                    <span></span>
                    <span><i>0</i><i>500</i><i>1000</i></span>
                </div>
                <figcaption>Power</figcaption>
            </figure>

        </section>

        <!-- ── INDICATORS ── -->
        <section aria-label="Status indicators">
            <input type="checkbox" id="led-1" checked aria-label="Indicator 1">
            <label for="led-1"></label>

            <input type="checkbox" id="led-2" checked aria-label="Indicator 2">
            <label for="led-2"></label>

            <input type="checkbox" id="led-3"         aria-label="Indicator 3">
            <label for="led-3"></label>

            <input type="checkbox" id="led-4" checked aria-label="Indicator 4">
            <label for="led-4"></label>

            <input type="checkbox" id="led-5" checked aria-label="Indicator 5">
            <label for="led-5"></label>

            <input type="checkbox" id="led-6"         aria-label="Indicator 6">
            <label for="led-6"></label>
        </section>

        <!-- ── TOGGLE SWITCHES ── labels link to the checkboxes above <main> -->
        <section aria-label="System switches">
            <label for="sw-1">Pump A</label>
            <!-- Easter egg 8: Pump B label worn off — barely visible, restores on hover -->
            <label for="sw-2">Pump B</label>
            <label for="sw-3">Turbine</label>
        </section>

        <!-- ── ROTARY KNOBS ── -->
        <section aria-label="Control knobs">

            <div>
                <span aria-hidden="true"></span>
                <input type="range" id="knob-freq" name="knob-freq"
                       min="-145" max="145" value="-145"
                       aria-label="Frequency control">
            </div>
            <label for="knob-freq">Frequency</label>

            <div>
                <span aria-hidden="true"></span>
                <input type="range" id="knob-pressure" name="knob-pressure"
                       min="-145" max="145" value="-145"
                       aria-label="Pressure control">
            </div>
            <label for="knob-pressure">Pressure</label>

            <div>
                <span aria-hidden="true"></span>
                <input type="range" id="knob-temp" name="knob-temp"
                       min="-145" max="145" value="-145"
                       aria-label="Temperature control">
            </div>
            <label for="knob-temp">Temp</label>

            <div>
                <span aria-hidden="true"></span>
                <input type="range" id="knob-power" name="knob-power"
                       min="-145" max="145" value="-145"
                       aria-label="Power control">
            </div>
            <label for="knob-power">Power</label>

        </section>

        <!-- ── PLANT CONTROLS — anchor links toggle :target state ── -->
        <section aria-label="Plant controls">
            <a href="#stopped" role="button">STOP</a>
            <a href="#running" role="button">START</a>
        </section>

        <!-- ── POWER OUTPUT DISPLAY ── -->
        <section aria-label="Power output display">
            <figure>
                <div aria-hidden="true">
                    <span>000</span><span>050</span><span>100</span>
                    <span>150</span><span>200</span><span>250</span>
                    <span>300</span><span>350</span><span>400</span>
                    <span>450</span><span>500</span><span>550</span>
                    <span>600</span><span>650</span><span>700</span>
                    <span>750</span><span>800</span><span>850</span>
                    <span>900</span><span>950</span><span>999</span>
                </div>
                <span>MW</span>
            </figure>
        </section>

        <!-- Easter egg 1: EMERGENCY meltdown — appears when all knobs max + running -->
        <p aria-hidden="true" aria-live="assertive">⚠ EMERGENCY ⚠</p>

    </main>

    <script>
        // Range → CSS custom property bridge.
        // Each input[type="range"] writes --{name} on :root.
        const ranges = document.querySelectorAll('[type="range"]');

        const updateRange = range => {
            document.documentElement.style.setProperty(
                '--' + range.name,
                range.value
            );
        };

        ranges.forEach(range => {
            updateRange(range);
            range.oninput = () => updateRange(range);
        });
    </script>

</body>
</html>
