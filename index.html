<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAFTWERK — Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="checkbox" id="plant-state">
    <input type="checkbox" id="sw-1" checked>
    <input type="checkbox" id="sw-2">
    <input type="checkbox" id="sw-3" checked>
    <main>

        <!-- GAUGES -->
        <section>
            <figure>
                <div>
                    <span>Hz</span>
                    <span></span>
                    <span></span>
                    <span><i>48</i><i>50</i><i>52</i></span>
                </div>
                <figcaption>Frequency</figcaption>
            </figure>
            <figure>
                <div>
                    <span>bar</span>
                    <span></span>
                    <span></span>
                    <span><i>0</i><i>100</i><i>200</i></span>
                </div>
                <figcaption>Pressure</figcaption>
            </figure>
            <figure>
                <div>
                    <span>°C</span>
                    <span></span>
                    <span></span>
                    <span><i>0</i><i>300</i><i>600</i></span>
                </div>
                <figcaption>Temperature</figcaption>
            </figure>
            <figure>
                <div>
                    <span>MW</span>
                    <span></span>
                    <span></span>
                    <span><i>0</i><i>500</i><i>1000</i></span>
                </div>
                <figcaption>Power</figcaption>
            </figure>
        </section>

        <!-- INDICATORS -->
        <section>
            <input type="checkbox" id="led-1" checked>
            <label for="led-1"></label>

            <input type="checkbox" id="led-2" checked>
            <label for="led-2"></label>

            <input type="checkbox" id="led-3">
            <label for="led-3"></label>

            <input type="checkbox" id="led-4" checked>
            <label for="led-4"></label>

            <input type="checkbox" id="led-5" checked>
            <label for="led-5"></label>

            <input type="checkbox" id="led-6">
            <label for="led-6"></label>
        </section>

        <!-- TOGGLE SWITCHES -->
        <section>
            <label for="sw-1">Pump A</label>
            <label for="sw-2">Pump B</label>
            <label for="sw-3">Turbine</label>
        </section>

        <!-- ROTARY KNOBS -->
        <section>
            <div>
                <span></span>
                <input type="range" id="knob-freq" name="knob-freq" min="-145" max="145" value="0">
            </div>
            <label for="knob-freq">Frequency</label>

            <div>
                <span></span>
                <input type="range" id="knob-pressure" name="knob-pressure" min="-145" max="145" value="-40">
            </div>
            <label for="knob-pressure">Pressure</label>

            <div>
                <span></span>
                <input type="range" id="knob-temp" name="knob-temp" min="-145" max="145" value="20">
            </div>
            <label for="knob-temp">Temp</label>

            <div>
                <span></span>
                <input type="range" id="knob-power" name="knob-power" min="-145" max="145" value="80">
            </div>
            <label for="knob-power">Power</label>
        </section>

        <!-- BUTTONS -->
        <section>
            <label for="plant-state">STOP</label>
            <label for="plant-state">START</label>
        </section>

        <!-- DISPLAY -->
        <section>
            <figure>
                <span>847</span>
                <span>MW</span>
            </figure>
        </section>

    </main>

    <script>
        // ONDERSTAANDE CODE MAG JE GEBRUIKEN
        // NIETS AANPASSEN

        const ranges = document.querySelectorAll('[type="range"]');

        const updateRange = range => {
            // the name of the custom property is the name of the input
            const rangeName = range.name;
            // the value of the custom property is the value of the input
            const rangeValue = range.value;
            // a custom property is set on the HTML element
            document.documentElement.style.setProperty("--" + rangeName, rangeValue);
        }

        ranges.forEach(range => {
            // the custom property is set initially after loading the document
            updateRange(range);

            // the custom property is updated when the input is changed
            range.oninput = () => {
                updateRange(range)
            };
        });
    </script>

</body>
</html>
